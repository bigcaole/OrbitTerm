name: release-installers

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: release-macos
          - os: windows-latest
            artifact_name: release-windows

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri bundle
        shell: bash
        env:
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        run: |
          if [[ -n "${TAURI_PRIVATE_KEY}" ]]; then
            echo "Using signed updater build."
            npx tauri build
          else
            echo "No updater signing key configured. Falling back to installer-only build."
            jq '.tauri.updater.active = false' src-tauri/tauri.conf.json > /tmp/tauri.release.conf.json
            npx tauri build --config /tmp/tauri.release.conf.json
          fi

      - name: Upload macOS release files
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/macos/*.app.tar.gz
            src-tauri/target/release/bundle/macos/*.app.tar.gz.sig
          if-no-files-found: error

      - name: Upload Windows release files
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.zip
            src-tauri/target/release/bundle/msi/*.msi.zip.sig
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.nsis.zip
            src-tauri/target/release/bundle/nsis/*.nsis.zip.sig
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Verify release assets
        run: find release-assets -type f -maxdepth 4

      - name: Generate updater latest.json (if signatures available)
        shell: bash
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}"
          mkdir -p release-assets/updater

          MAC_ARCHIVE="$(find release-assets -type f -name '*.app.tar.gz' | head -n 1 || true)"
          WINDOWS_ARCHIVE="$(find release-assets -type f -name '*.msi.zip' | head -n 1 || true)"
          if [[ -z "${WINDOWS_ARCHIVE}" ]]; then
            WINDOWS_ARCHIVE="$(find release-assets -type f -name '*.nsis.zip' | head -n 1 || true)"
          fi

          if [[ -z "${MAC_ARCHIVE}" || -z "${WINDOWS_ARCHIVE}" ]]; then
            cat > release-assets/updater/latest.json <<JSON
          {
            "version": "${VERSION}",
            "notes": "OrbitTerm ${VERSION} 发布完成（当前发布未启用签名更新包）。",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {}
          }
          JSON
            echo "Updater archives not found, emitted fallback latest.json."
            exit 0
          fi

          MAC_SIG_FILE="${MAC_ARCHIVE}.sig"
          WINDOWS_SIG_FILE="${WINDOWS_ARCHIVE}.sig"
          if [[ ! -f "${MAC_SIG_FILE}" || ! -f "${WINDOWS_SIG_FILE}" ]]; then
            cat > release-assets/updater/latest.json <<JSON
          {
            "version": "${VERSION}",
            "notes": "OrbitTerm ${VERSION} 发布完成（当前发布缺少签名文件）。",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {}
          }
          JSON
            echo "Updater signatures not found, emitted fallback latest.json."
            exit 0
          fi

          MAC_PLATFORM="darwin-aarch64"
          if [[ "${MAC_ARCHIVE}" == *"x64"* || "${MAC_ARCHIVE}" == *"x86_64"* ]]; then
            MAC_PLATFORM="darwin-x86_64"
          fi

          MAC_NAME="$(basename "${MAC_ARCHIVE}")"
          WINDOWS_NAME="$(basename "${WINDOWS_ARCHIVE}")"
          MAC_SIG="$(tr -d '\r\n' < "${MAC_SIG_FILE}")"
          WINDOWS_SIG="$(tr -d '\r\n' < "${WINDOWS_SIG_FILE}")"

          cat > release-assets/updater/latest.json <<JSON
          {
            "version": "${VERSION}",
            "notes": "OrbitTerm ${VERSION} 自动发布更新包。",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "${MAC_PLATFORM}": {
                "signature": "${MAC_SIG}",
                "url": "${BASE_URL}/${MAC_NAME}"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "${BASE_URL}/${WINDOWS_NAME}"
              }
            }
          }
          JSON

          echo "Generated updater manifest at release-assets/updater/latest.json"
          cat release-assets/updater/latest.json

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.tar.gz
            release-assets/**/*.msi
            release-assets/**/*.exe
            release-assets/**/*.zip
            release-assets/**/*.sig
            release-assets/updater/latest.json
